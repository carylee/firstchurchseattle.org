; Local dev: derive WP_HOME/WP_SITEURL from the request host so the site works
; under the Tailscale-served hostname as well as *.ddev.site. The prepended
; script runs before wp-config.php (and thus before wp-config-ddev.php pins the
; URL), and lives outside wp-config.php so it survives `ddev restart`.
; See ops/wp-dynamic-url.php.
auto_prepend_file = /var/www/html/ops/wp-dynamic-url.php
