name: CI

# Runs on every PR into main, and on pushes to main (so the deploy workflow,
# which waits for a green CI run, has something to gate on). Fast, no DB, no WP:
# our tracked code is a child theme + a few plugins, and the breeze-forms test
# suite is standalone (its bootstrap shims the handful of WP functions it uses).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PHP lint (php ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3'] # prod runs 8.2 (web) / 8.3 (cli)
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Syntax-check every tracked PHP file
        run: |
          fail=0
          while read -r f; do
            php -l "$f" >/dev/null || { echo "::error file=$f::php -l failed"; fail=1; }
          done < <(git ls-files '*.php')
          if [ "$fail" -eq 0 ]; then
            echo "All $(git ls-files '*.php' | wc -l) PHP files OK."
          fi
          exit $fail

  deploy-coverage:
    name: deploy coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Every tracked plugin/theme is wired into ops/deploy.sh
        run: ops/scripts/check-deploy-coverage.sh

  breeze-forms:
    name: breeze-forms PHPUnit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wp-content/plugins/firstchurch-breeze-forms
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: PHPUnit
        run: vendor/bin/phpunit

  carousel:
    name: carousel PHPUnit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wp-content/plugins/firstchurch-carousel
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: PHPUnit
        run: vendor/bin/phpunit

  stock-photos:
    name: stock-photos PHPUnit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wp-content/plugins/firstchurch-stock-photos
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: PHPUnit
        run: vendor/bin/phpunit
  happenings:
    name: happenings PHPUnit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wp-content/plugins/firstchurch-happenings
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: PHPUnit
        run: vendor/bin/phpunit

  tailwind-build:
    name: tailwind in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: wp-content/themes/maranatha-child/package-lock.json
      - name: tailwind.css matches its source
        run: ops/scripts/check-tailwind-build.sh

  composer-audit:
    name: composer audit (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - firstchurch-breeze-forms
          - firstchurch-carousel
          - firstchurch-stock-photos
          - firstchurch-happenings
          - firstchurch-events
    defaults:
      run:
        working-directory: wp-content/plugins/${{ matrix.plugin }}
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
      # Audit the locked dependency tree for known CVEs. Composer deps are
      # dev-only here (PHPUnit etc.; the one runtime dep, php-rrule, is vendored
      # under events/lib/ and excluded from deploy), so this guards the toolchain
      # rather than shipped code — still worth catching before it lands.
      - name: composer audit
        run: composer audit --no-interaction --locked

  asset-version:
    name: asset version bump
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Assets changed must bump the plugin/theme version
        run: ops/scripts/check-asset-version-bump.sh
        env:
          BASE_REF: origin/${{ github.base_ref }}
