name: CI

# Runs on every PR into main, and on pushes to main (so the deploy workflow,
# which waits for a green CI run, has something to gate on). Fast, no DB, no WP:
# our tracked code is a child theme + a few plugins, and the breeze-forms test
# suite is standalone (its bootstrap shims the handful of WP functions it uses).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PHP lint (php ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3'] # prod runs 8.2 (web) / 8.3 (cli)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Syntax-check every tracked PHP file
        run: |
          fail=0
          while read -r f; do
            php -l "$f" >/dev/null || { echo "::error file=$f::php -l failed"; fail=1; }
          done < <(git ls-files '*.php')
          if [ "$fail" -eq 0 ]; then
            echo "All $(git ls-files '*.php' | wc -l) PHP files OK."
          fi
          exit $fail

  deploy-coverage:
    name: sync coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Every tracked plugin/theme is wired into ops/deploy.sh
        run: ops/scripts/check-deploy-coverage.sh
      - name: Every tracked plugin/theme/mu-plugin is protected from ddev pull-prod
        run: ops/scripts/check-pull-protection.sh

  # The PHPUnit and composer-audit matrices are DISCOVERED from tracked files,
  # not hand-listed: a suite dir (under plugins/ OR mu-plugins/) with a
  # phpunit.xml.dist gets a test job, one with a composer.lock gets a CVE
  # audit. A new suite runs the moment it lands — no ci.yml edit, so tests
  # can't be silently skipped the way an unwired deploy path could (see
  # ops/scripts/check-deploy-coverage.sh). Matrix entries are wp-content-
  # relative dirs, e.g. "plugins/firstchurch-events", "mu-plugins/firstchurch-mcp".
  discover:
    name: discover plugin suites
    runs-on: ubuntu-latest
    outputs:
      phpunit: ${{ steps.list.outputs.phpunit }}
      audit: ${{ steps.list.outputs.audit }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build matrices from tracked suite markers
        id: list
        run: |
          phpunit=$(git ls-files | { grep -E '^wp-content/(plugins|mu-plugins)/[^/]+/phpunit\.xml\.dist$' || true; } | sed -E 's#^wp-content/##; s#/phpunit\.xml\.dist$##' | sort | jq -R . | jq -cs .)
          audit=$(git ls-files | { grep -E '^wp-content/(plugins|mu-plugins)/[^/]+/composer\.lock$' || true; } | sed -E 's#^wp-content/##; s#/composer\.lock$##' | sort | jq -R . | jq -cs .)
          echo "phpunit=$phpunit" >> "$GITHUB_OUTPUT"
          echo "audit=$audit" >> "$GITHUB_OUTPUT"
          echo "PHPUnit matrix: $phpunit"
          echo "Audit matrix:   $audit"
          # A tracked plugin with no suite at all is lint-only — surface it, don't fail.
          for p in $(git ls-files wp-content/plugins | awk -F/ 'NF>=4 {print $3}' | sort -u); do
            [ -f "wp-content/plugins/$p/phpunit.xml.dist" ] || \
              echo "::warning::wp-content/plugins/$p has no PHPUnit suite — lint-only."
          done

  phpunit:
    name: PHPUnit (${{ matrix.suite }})
    needs: discover
    if: needs.discover.outputs.phpunit != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(needs.discover.outputs.phpunit) }}
    defaults:
      run:
        working-directory: wp-content/${{ matrix.suite }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: PHPUnit
        run: vendor/bin/phpunit

  tailwind-build:
    name: tailwind builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: wp-content/themes/maranatha-child/package-lock.json
      # Smoke test: prove assets/src/input.css still compiles. tailwind.css is
      # NOT committed (CD builds it on deploy), so there's nothing to diff against
      # — this just catches a broken source at PR time instead of at deploy time.
      - name: Compile Tailwind from source
        run: wp-content/themes/maranatha-child/build-css.sh

  child-theme-js:
    name: child theme JS (lint + unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wp-content/themes/maranatha-child
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: wp-content/themes/maranatha-child/package-lock.json
      - name: Install dev toolchain
        run: npm ci --no-audit --no-fund
      - name: Biome lint + format check
        run: npm run lint
      # Unit tests only (happy-dom). Playwright e2e is local-only — it needs a
      # running WordPress, which this CI deliberately does not provision.
      - name: Vitest
        run: npm test

  composer-audit:
    name: composer audit (${{ matrix.suite }})
    needs: discover
    if: needs.discover.outputs.audit != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(needs.discover.outputs.audit) }}
    defaults:
      run:
        working-directory: wp-content/${{ matrix.suite }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
      # Audit the locked dependency tree for known CVEs. Composer deps are
      # dev-only here (PHPUnit etc.; the one runtime dep, php-rrule, is vendored
      # under events/lib/ and excluded from deploy), so this guards the toolchain
      # rather than shipped code — still worth catching before it lands.
      - name: composer audit
        run: composer audit --no-interaction --locked

  asset-version:
    name: asset version bump
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Assets changed must bump the plugin/theme version
        run: ops/scripts/check-asset-version-bump.sh
        env:
          BASE_REF: origin/${{ github.base_ref }}

  # Aggregate gate: the ONE status check branch protection requires. The matrix
  # job names change as plugins come and go, so protection can't enumerate them
  # — it requires this job instead. Fails if any upstream job failed or was
  # cancelled; "skipped" is fine (asset-version only runs on PRs, and the matrix
  # jobs skip only when discovery finds nothing to run).
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - deploy-coverage
      - discover
      - phpunit
      - tailwind-build
      - child-theme-js
      - composer-audit
      - asset-version
    steps:
      - name: Fail if any upstream job failed or was cancelled
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          echo "$RESULTS" | jq -e 'all(.[]; .result == "success" or .result == "skipped")' >/dev/null
